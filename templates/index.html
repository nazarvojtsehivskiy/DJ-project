{% extends 'base.html' %}

{% block content %}
<h1 class="page-title">Всі машини</h1>
<p class="page-subtitle">Оберіть категорію (бренд) у меню, щоб відфільтрувати список.</p>

<section class="grid">
    {% for car in cars %}
        <article class="card">
            <h3 class="card-title">{{ car.name }}</h3>
            <p class="card-meta">{{ car.brand.name }}</p>
            <p class="card-price">{{ car.price }} грн</p>
        </article>
    {% empty %}
        <p>Немає машин для відображення.</p>
    {% endfor %}
</section>

{% endblock %}
